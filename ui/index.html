<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shotty</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Title Bar -->
  <header class="titlebar" data-tauri-drag-region>
    <div class="titlebar-left" data-tauri-drag-region>
      <span class="app-logo" data-tauri-drag-region>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </span>
      <span class="app-title" data-tauri-drag-region>Shotty</span>
    </div>
    <div class="titlebar-right">
      <button class="titlebar-btn" id="settingsBtn" title="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="toolbar-group">
      <button class="tool-btn capture-btn" id="captureBtn" title="Capture Region (⌘⇧4)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        <span>Capture</span>
      </button>
      <button class="tool-btn" id="fullscreenBtn" title="Capture Fullscreen">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
        </svg>
      </button>
    </div>

    <div class="toolbar-divider"></div>

    <div class="toolbar-group tools-group">
      <button class="tool-btn active" data-tool="select" title="Select">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/>
          <path d="M13 13l6 6"/>
        </svg>
      </button>
      <button class="tool-btn" data-tool="freehand" title="Freehand Draw">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/>
          <circle cx="11" cy="11" r="2"/>
        </svg>
      </button>
      <button class="tool-btn" data-tool="line" title="Line">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="5" y1="19" x2="19" y2="5"/>
        </svg>
      </button>
      <button class="tool-btn" data-tool="arrow" title="Arrow">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="19" x2="19" y2="5"/>
          <polyline points="10 5 19 5 19 14"/>
        </svg>
      </button>
      <button class="tool-btn" data-tool="rect" title="Rectangle">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
        </svg>
      </button>
      <button class="tool-btn" data-tool="ellipse" title="Ellipse">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <ellipse cx="12" cy="12" rx="10" ry="7"/>
        </svg>
      </button>
      <button class="tool-btn" data-tool="text" title="Text">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/>
        </svg>
      </button>
      <button class="tool-btn" data-tool="highlight" title="Highlighter">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15.09 3.26l5.65 5.65-8.49 8.49H6.6V11.75l8.49-8.49z"/><line x1="2" y1="22" x2="10" y2="22"/>
        </svg>
      </button>
      <button class="tool-btn" data-tool="magnify" title="Magnify">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/>
        </svg>
      </button>
      <button class="tool-btn" data-tool="blur" title="Blur">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6" opacity="0.6"/><circle cx="12" cy="12" r="2" opacity="0.3"/>
        </svg>
      </button>
    </div>

    <div class="toolbar-divider"></div>

    <div class="toolbar-group">
      <div class="color-picker-group">
        <button class="color-swatch active" data-color="#ef4444" style="--swatch:#ef4444" title="Red"></button>
        <button class="color-swatch" data-color="#f97316" style="--swatch:#f97316" title="Orange"></button>
        <button class="color-swatch" data-color="#eab308" style="--swatch:#eab308" title="Yellow"></button>
        <button class="color-swatch" data-color="#22c55e" style="--swatch:#22c55e" title="Green"></button>
        <button class="color-swatch" data-color="#3b82f6" style="--swatch:#3b82f6" title="Blue"></button>
        <button class="color-swatch" data-color="#8b5cf6" style="--swatch:#8b5cf6" title="Purple"></button>
        <button class="color-swatch" data-color="#ffffff" style="--swatch:#ffffff" title="White"></button>
        <button class="color-swatch" data-color="#000000" style="--swatch:#000000; border: 1px solid #555" title="Black"></button>
      </div>
    </div>

    <div class="toolbar-divider"></div>

    <div class="toolbar-group">
      <div class="stroke-control">
        <label class="stroke-label">Size</label>
        <input type="range" id="strokeWidth" min="1" max="12" value="3" class="stroke-slider">
        <span class="stroke-value" id="strokeValue">3</span>
      </div>
    </div>

    <div class="toolbar-divider"></div>

    <div class="toolbar-group">
      <button class="tool-btn" id="undoBtn" title="Undo (⌘Z)" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
        </svg>
      </button>
      <button class="tool-btn" id="redoBtn" title="Redo (⌘⇧Z)" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.13-9.36L23 10"/>
        </svg>
      </button>
      <button class="tool-btn" id="clearBtn" title="Clear Annotations">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Canvas Area -->
  <main class="canvas-area" id="canvasArea">
    <!-- Empty State -->
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </div>
      <h2>Take a Screenshot</h2>
      <p>Click <strong>Capture</strong> or press <kbd>⌘</kbd> <kbd>⇧</kbd> <kbd>S</kbd> to select a region</p>
    </div>

    <!-- Canvas Container (hidden until screenshot taken) -->
    <div class="canvas-container" id="canvasContainer" style="display:none;">
      <canvas id="drawingCanvas"></canvas>
    </div>
  </main>

  <!-- Bottom Action Bar -->
  <footer class="action-bar" id="actionBar" style="display:none;">
    <div class="action-bar-left">
      <span class="image-info" id="imageInfo"></span>
    </div>
    <div class="action-bar-right">
      <button class="action-btn secondary" id="saveBtn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Save
      </button>
      <button class="action-btn secondary" id="copyImageBtn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        Copy
      </button>
      <button class="action-btn primary" id="uploadBtn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
        </svg>
        Upload to S3
      </button>
    </div>
  </footer>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settingsModal">
    <div class="modal">
      <div class="modal-header">
        <h2>Settings</h2>
        <button class="modal-close" id="closeSettings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="settings-section">
          <h3>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 3a3 3 0 0 0-3 3v12a3 3 0 0 0 3 3 3 3 0 0 0 3-3 3 3 0 0 0-3-3H6a3 3 0 0 0-3 3 3 3 0 0 0 3 3 3 3 0 0 0 3-3V6a3 3 0 0 0-3-3 3 3 0 0 0-3 3 3 3 0 0 0 3 3h12a3 3 0 0 0 3-3 3 3 0 0 0-3-3z"/>
            </svg>
            Keyboard Shortcut
          </h3>
          <div class="form-group">
            <label>Global Capture Shortcut</label>
            <p class="form-hint">Works even when Shotty is in the background</p>
            <div class="shortcut-recorder" id="shortcutRecorder">
              <span class="shortcut-keys" id="shortcutDisplay">⌘⇧S</span>
              <button class="shortcut-record-btn" id="recordShortcutBtn">Record</button>
            </div>
            <input type="hidden" id="captureShortcut" value="CommandOrControl+Shift+S">
          </div>
        </div>

        <div class="settings-section">
          <h3>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
            </svg>
            AWS Configuration
          </h3>
          <div class="form-group">
            <label for="awsAccessKey">Access Key ID</label>
            <input type="text" id="awsAccessKey" placeholder="AKIAIOSFODNN7EXAMPLE" autocomplete="off" spellcheck="false">
          </div>
          <div class="form-group">
            <label for="awsSecretKey">Secret Access Key</label>
            <input type="password" id="awsSecretKey" placeholder="wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY" autocomplete="off">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="awsRegion">Region</label>
              <select id="awsRegion">
                <option value="us-east-1">US East (N. Virginia)</option>
                <option value="us-east-2">US East (Ohio)</option>
                <option value="us-west-1">US West (N. California)</option>
                <option value="us-west-2">US West (Oregon)</option>
                <option value="eu-west-1">EU (Ireland)</option>
                <option value="eu-west-2">EU (London)</option>
                <option value="eu-central-1">EU (Frankfurt)</option>
                <option value="ap-northeast-1">Asia Pacific (Tokyo)</option>
                <option value="ap-southeast-1">Asia Pacific (Singapore)</option>
                <option value="ap-southeast-2">Asia Pacific (Sydney)</option>
              </select>
            </div>
            <div class="form-group">
              <label for="s3Bucket">Bucket Name</label>
              <input type="text" id="s3Bucket" placeholder="my-screenshots" autocomplete="off" spellcheck="false">
            </div>
          </div>
          <div class="form-group">
            <label for="customDomain">Custom Domain <span class="optional">(optional)</span></label>
            <input type="text" id="customDomain" placeholder="https://cdn.example.com" autocomplete="off" spellcheck="false">
          </div>
          <div class="form-group checkbox-group">
            <label class="checkbox-label">
              <input type="checkbox" id="makePublic" checked>
              <span class="checkbox-custom"></span>
              Make uploaded files public
            </label>
          </div>
          <button class="action-btn outline" id="testConnectionBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
              <polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
            Test Connection
          </button>
        </div>

        <div class="settings-section">
          <h3>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
            </svg>
            Local Storage
          </h3>
          <div class="form-group">
            <label for="saveDirectory">Save Directory</label>
            <input type="text" id="saveDirectory" placeholder="~/Pictures" spellcheck="false">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="action-btn secondary" id="cancelSettings">Cancel</button>
        <button class="action-btn primary" id="saveSettingsBtn">Save Settings</button>
      </div>
    </div>
  </div>

  <!-- Display Picker -->
  <div class="modal-overlay" id="displayPicker">
    <div class="display-picker-panel">
      <h3>Select Display</h3>
      <div class="display-list" id="displayList"></div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Text Input (for text tool) -->
  <textarea class="floating-text-input" id="floatingTextInput" style="display:none;" placeholder="Type here..."></textarea>

  <script src="canvas.js"></script>
  <script src="app.js"></script>
</body>
</html>
