<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; }
  html, body {
    width: 100vw;
    height: 100vh;
    background: transparent;
    overflow: hidden;
  }
  .border {
    position: fixed;
    inset: 0;
    border: 4px solid #ef4444;
    border-radius: 4px;
    pointer-events: none;
    box-shadow: 0 0 20px rgba(239, 68, 68, 0.4), inset 0 0 20px rgba(239, 68, 68, 0.1);
  }
</style>
</head>
<body>
  <div class="border"></div>
</body>
</html>
